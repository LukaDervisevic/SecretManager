name: ci_dev.yml
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: lukadervisevic/secret-manager-api

permissions: 
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: SDK setup
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Tests
        run: dotnet test --no-build --verbosity normal
      
  build-docker:
    runs-on: ubuntu-22.04
    needs: build
    
    services: 
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: secret_manager_smoke
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: smoke_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
          
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image and tag latest
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Container smoke test
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"

          echo "Starting container with image: $IMAGE"

          docker run -d \
            --name api-smoke \
            -p 8080:8080 \
            -e ASPNETCORE_ENVIRONMENT=Development \
            -e ASPNETCORE_URLS=http://+:8080 \
            -e ConnectionStrings__DefaultConnection="Host=localhost;Database=secret_manager_smoke;Username=postgres;Password=smoke_password" \
            -e JwtSettings__SecretKey="2kzldc9m2xqznyoeetwt9j46kquk5r21" \
            -e JwtSettings__Issuer="SecretManager" \
            -e JwtSettings__Audience="SecretManager" \
            -e JwtSettings__ExpiryMinutes="60" \
            "$IMAGE"

          echo "Waiting for container to start..."
          sleep 8

          echo "Container status:"
          docker ps -a --filter name=api-smoke

          echo "Container logs:"
          docker logs api-smoke

          echo "Running health check..."
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/health || echo "000")
            echo "Attempt $i - HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Smoke test passed!"
              docker stop api-smoke
              docker rm api-smoke
              exit 0
            fi
            sleep 3
          done

          echo "Smoke test failed — dumping final logs:"
          docker
          
      - name: Pushing to Github registry 
        run: |
          docker push ${{env.REGISTRY}}/${{env.IMAGE_NAME}}:latest
          